    <!-- B body with counter cutouts -->
    <path fill-rule="evenodd" d="
      M2 6.5 H8.5 C14.5 6.5 14.5 14 8.5 14 C15.5 14 15.5 23 8.5 23 H2 Z
      M4.8 9 H7.5 C11 9 11 12 7.5 12 H4.8 Z
