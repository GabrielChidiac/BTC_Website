<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#0A0A0C"/>
  <g transform="translate(16,16)">
    <!-- ₿ symbol — classic Bitcoin B with two vertical bars -->
    <g fill="#F7931A">
      <!-- Vertical bars through the top and bottom -->
      <rect x="-3.5" y="-13" width="2" height="4.5" rx="1"/>
      <rect x="1.5" y="-13" width="2" height="4.5" rx="1"/>
      <rect x="-3.5" y="8.5" width="2" height="4.5" rx="1"/>
      <rect x="1.5" y="8.5" width="2" height="4.5" rx="1"/>
      <!-- B body -->
      <path d="
        M-6.5,-9 L2,-9
        C7,-9 7,-1 2,-1
        L-6.5,-1 Z
      "/>
      <path d="
        M-6.5,0 L3,0
        C8.5,0 8.5,9 3,9
        L-6.5,9 Z
      "/>
      <!-- Counter cutouts (holes in the B) -->
      <rect x="-4" y="-7" width="5" height="4" rx="1.5" fill="#0A0A0C"/>
      <rect x="-4" y="2" width="6" height="5" rx="1.5" fill="#0A0A0C"/>
    </g>
  </g>
</svg>
