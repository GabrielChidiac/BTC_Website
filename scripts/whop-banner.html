<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Whop Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .banner {
    width: 1200px;
    height: 630px;
    background: #0d0d0f;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 100px;
  }

  /* Subtle grid texture */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Orange glow top-right */
  .glow-1 {
    position: absolute;
    top: -120px;
    right: -80px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(247,147,26,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Blue glow bottom-left */
  .glow-2 {
    position: absolute;
    bottom: -150px;
    left: -100px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #e8e8e8;
    margin-bottom: 32px;
  }
  .logo span { color: #F7931A; }

  .tagline {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 500;
    color: #c0c0c0;
    letter-spacing: -0.01em;
    line-height: 1.3;
    margin-bottom: 40px;
    max-width: 650px;
  }

  .features {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .feature {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #F7931A;
    flex-shrink: 0;
  }

  /* Bottom accent line */
  .accent-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #F7931A 30%, #F7931A 70%, transparent);
  }

  /* Subtle noise */
  .noise {
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  .instructions {
    font-family: 'Inter', sans-serif;
    color: #666;
    font-size: 14px;
    margin-top: 40px;
    text-align: center;
  }
</style>
</head>
<body>

<div>
  <div class="banner" id="banner">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div class="noise"></div>

    <div class="content">
      <div class="logo">BTC <span>Today</span></div>
      <div class="tagline">AI-Curated Daily Bitcoin Intelligence<br>for Institutional Investors</div>
      <div class="features">
        <div class="feature"><div class="dot"></div>Market Analysis</div>
        <div class="feature"><div class="dot"></div>ETF & Institutional Flows</div>
        <div class="feature"><div class="dot"></div>Expert Insights</div>
        <div class="feature"><div class="dot"></div>Technical Signals</div>
        <div class="feature"><div class="dot"></div>PDF Downloads</div>
      </div>
    </div>

    <div class="accent-line"></div>
  </div>

  <p class="instructions">Right-click the banner above &rarr; "Save Image As" or take a screenshot (1200&times;630)</p>
</div>

</body>
</html>
